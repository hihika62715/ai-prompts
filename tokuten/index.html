<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>読者限定特典 | AIネイティブ世代の育て方</title>
<style>
  :root {
    --orange: #E07040;
    --navy: #1E3A64;
    --cream: #fdfdf8;
    --border: #e0d8cc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: var(--cream);
    color: #333;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: linear-gradient(135deg, var(--navy) 0%, #2d5a96 100%);
    color: white;
    padding: 22px 20px 18px;
    text-align: center;
  }
  .badge {
    display: inline-block;
    background: var(--orange);
    font-size: 11px;
    font-weight: bold;
    padding: 3px 12px;
    border-radius: 20px;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 900;
    line-height: 1.4;
  }

  main {
    flex: 1;
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
    padding: 20px 16px 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    background: white;
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 18px 16px;
    transition: border-color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    min-height: 72px;
  }
  .card:active { transform: scale(0.97); border-color: var(--orange); }

  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .icon-orange { background: #fdf0e8; }
  .icon-green  { background: #eaf6f0; }

  .card-body { flex: 1; }
  .card-num {
    font-size: 11px;
    font-weight: bold;
    color: var(--orange);
    margin-bottom: 2px;
  }
  .card-title {
    font-size: 16px;
    font-weight: 900;
    color: var(--navy);
    line-height: 1.3;
  }
  .card-sub {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
  }

  .card-arrow {
    font-size: 18px;
    color: var(--orange);
    flex-shrink: 0;
  }

  .note {
    background: #fff8e1;
    border: 1px solid #f5c842;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: #7a5f00;
    line-height: 1.6;
    text-align: center;
  }

  footer {
    background: var(--navy);
    color: rgba(255,255,255,0.5);
    text-align: center;
    padding: 14px;
    font-size: 11px;
  }
</style>
</head>
<body>

<header>
  <div class="badge">読者限定特典</div>
  <h1>0〜6歳 AIネイティブ世代の育て方</h1>
</header>

<main>

  <a class="card" href="prompts.html">
    <div class="card-icon icon-orange">💬</div>
    <div class="card-body">
      <div class="card-num">特典①</div>
      <div class="card-title">ChatGPTプロンプト集 30選</div>
      <div class="card-sub">コピーボタン付き・カテゴリ別・検索あり</div>
    </div>
    <div class="card-arrow">›</div>
  </a>

  <a class="card" href="kiroku.html">
    <div class="card-icon icon-green">📝</div>
    <div class="card-body">
      <div class="card-num">特典②</div>
      <div class="card-title">子育て記録テンプレート</div>
      <div class="card-sub">月齢別成長記録・育児日記・AI記録</div>
    </div>
    <div class="card-arrow">›</div>
  </a>

  <div class="note">
    特典②の記録データはこのブラウザのみに保存されます。<br>定期的に「記録を一括コピー」でバックアップを取ってください。
  </div>

</main>

<footer>0〜6歳 AIネイティブ世代の育て方 読者限定特典</footer>

</body>
</html>
